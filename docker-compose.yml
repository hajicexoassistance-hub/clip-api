version: '3.8'

services:
  app:
    build: .
    container_name: portrait-app
    restart: always
    environment:
      - PORTRAITGEN_BASE_URL=/files/
      - PORTRAITGEN_DB_PATH=/app/data/job_history.db
      - PORTRAITGEN_OUTPUT_DIR=/app/output
      - PORTRAITGEN_API_KEY=${PORTRAITGEN_API_KEY}
      - SUMOPOD_API_KEY=${SUMOPOD_API_KEY}
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: portrait-nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./output:/usr/share/nginx/html/files:ro
    ports:
      - "8081:80"
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
